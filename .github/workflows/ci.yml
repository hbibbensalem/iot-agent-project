name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install flake8 pytest
        cd backend && pip install -r requirements.txt && cd ..
        cd dashboard && pip install -r requirements.txt && cd ..
        cd simulator && pip install -r requirements.txt && cd ..

    - name: Lint with flake8
      run: |
        flake8 backend/ dashboard/ simulator/ --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Test imports
      run: |
        cd backend && python -c "import main; print('✅ Backend OK')" && cd ..
        cd dashboard && python -c "import app; print('✅ Dashboard OK')" && cd ..
        cd simulator && python -c "import simulator; print('✅ Simulator OK')" && cd ..

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker images
      run: |
        docker build -t iot-backend ./backend
        docker build -t iot-dashboard ./dashboard
        docker build -t iot-simulator ./simulator
        echo "✅ All images built successfully"

  deploy:
    needs: [test, build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Deploy Backend to Render
      run: |
        echo "Deploying backend..."
        RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_BACKEND_HOOK }}")
        if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "201" ]; then
          echo "✅ Backend deployed (HTTP $RESPONSE)"
        else
          echo "⚠️ Backend deploy hook returned HTTP $RESPONSE"
          echo "Render service might be waking up from sleep..."
        fi

    - name: Deploy Dashboard to Render
      run: |
        echo "Deploying dashboard..."
        RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DASHBOARD_HOOK }}")
        if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "201" ]; then
          echo "✅ Dashboard deployed (HTTP $RESPONSE)"
        else
          echo "⚠️ Dashboard deploy hook returned HTTP $RESPONSE"
        fi

    - name: Deploy Simulator to Railway (optional)
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      run: |
        if [ -n "$RAILWAY_TOKEN" ]; then
          npm install -g @railway/cli
          railway login --token "$RAILWAY_TOKEN"
          railway up --service simulateur
          echo "✅ Simulator deployed to Railway"
        else
          echo "ℹ️ Railway token not set, skipping simulator deploy"
        fi