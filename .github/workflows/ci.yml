name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install flake8
        cd backend && pip install -r requirements.txt
        cd ../dashboard && pip install -r requirements.txt
        cd ../simulator && pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        flake8 backend/ dashboard/ simulator/ --count --select=E9,F63,F7,F82 --show-source --statistics || true

    - name: Test backend imports (with mock env vars)
      env:
        SUPABASE_URL: https://mock.supabase.co
        SUPABASE_KEY: mock_key_for_testing
        GROQ_API_KEY: mock_key_for_testing
      run: |
        cd backend
        python -c "import main; print('✅ Backend imports OK')"

    - name: Test dashboard imports
      run: |
        cd dashboard
        python -c "import app; print('✅ Dashboard imports OK')"

    - name: Test simulator imports
      run: |
        cd simulator
        python -c "import simulator; print('✅ Simulator imports OK')"

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker images
      run: |
        docker build -t iot-backend ./backend
        docker build -t iot-dashboard ./dashboard
        docker build -t iot-simulator ./simulator

  deploy:
    needs: [test, build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Deploy Backend to Render
      run: |
        RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_BACKEND_HOOK }}")
        echo "Backend deploy: HTTP $RESPONSE"

    - name: Deploy Dashboard to Render
      run: |
        RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DASHBOARD_HOOK }}")
        echo "Dashboard deploy: HTTP $RESPONSE"