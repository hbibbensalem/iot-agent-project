name: CI/CD IoT Agent

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install backend dependencies
      run: |
        cd backend
        pip install -r requirements.txt

    - name: Install dashboard dependencies
      run: |
        cd dashboard
        pip install -r requirements.txt

    - name: Install simulator dependencies
      run: |
        cd simulator
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 backend/ dashboard/ simulator/ --count --select=E9,F63,F7,F82 --show-source --statistics
