name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install backend dependencies
      run: |
        cd backend
        pip install -r requirements.txt

    - name: Install dashboard dependencies
      run: |
        cd dashboard
        pip install -r requirements.txt

    - name: Install simulator dependencies
      run: |
        cd simulator
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 backend/ dashboard/ simulator/ --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Test backend imports
      run: |
        cd backend
        python -c "import main; print('Backend imports OK')"

    - name: Test dashboard imports
      run: |
        cd dashboard
        python -c "import app; print('Dashboard imports OK')"

    - name: Test simulator imports
      run: |
        cd simulator
        python -c "import simulator; print('Simulator imports OK')"

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build backend Docker image
      run: |
        cd backend
        docker build -t iot-backend .

    - name: Build dashboard Docker image
      run: |
        cd dashboard
        docker build -t iot-dashboard .

    - name: Build simulator Docker image
      run: |
        cd simulator
        docker build -t iot-simulator .

  deploy-backend:
    needs: [test, build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Deploy Backend to Render
      run: |
        curl -X POST "${{ secrets.RENDER_BACKEND_HOOK }}"
        echo "Backend deployed successfully!"

  deploy-dashboard:
    needs: deploy-backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Deploy Dashboard to Render
      run: |
        curl -X POST "${{ secrets.RENDER_DASHBOARD_HOOK }}"
        echo "Dashboard deployed successfully!"